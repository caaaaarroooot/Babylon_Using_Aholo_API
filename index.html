<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon.js 3DGS Demo</title>
    <style>
      html,
      body,
      #renderCanvas {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1a1a2e;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #eee;
        font-family: system-ui, sans-serif;
        font-size: 1rem;
      }
      #hud {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        color: #eee;
        font-family: system-ui, sans-serif;
        pointer-events: none;
      }
      #collision-status {
        display: block;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 0.95rem;
        max-width: 520px;
      }
      #collision-status strong {
        display: block;
        margin-bottom: 4px;
      }
      #collision-detail {
        display: block;
        font-size: 0.82rem;
        opacity: 0.9;
        line-height: 1.45;
      }
      #collision-status[data-state="hit"] {
        border-color: #ff6b6b;
        color: #ffd0d0;
      }
      #hud p {
        margin: 8px 0 0;
        font-size: 0.82rem;
        opacity: 0.75;
      }
      #lod-status {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #eee;
        font-family: system-ui, sans-serif;
        font-size: 0.84rem;
        min-width: 190px;
        line-height: 1.5;
      }
      #lod-status strong {
        display: block;
        margin-bottom: 4px;
      }
      #lod-status span {
        display: block;
      }
      #lod-status #lod-status-loaded {
        font-size: 1rem;
        font-variant-numeric: tabular-nums;
      }
      #lod-status #lod-status-pct {
        font-size: 0.82rem;
        opacity: 0.85;
        margin-top: 2px;
      }
      #perf-status {
        position: absolute;
        bottom: 16px;
        right: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #eee;
        font-family: system-ui, sans-serif;
        font-size: 0.84rem;
        min-width: 200px;
        line-height: 1.5;
        pointer-events: none;
      }
      #perf-status strong {
        display: block;
        margin-bottom: 4px;
      }
      #perf-status span {
        display: block;
        font-variant-numeric: tabular-nums;
      }
      #perf-fps {
        font-size: 1.35rem;
        font-weight: 600;
      }
      #perf-fps[data-level="good"] {
        color: #7dffa8;
      }
      #perf-fps[data-level="mid"] {
        color: #ffd966;
      }
      #perf-fps[data-level="low"] {
        color: #ff8a8a;
      }
      #perf-frame,
      #perf-resolution,
      #perf-splats {
        font-size: 0.8rem;
        opacity: 0.9;
      }
      #collider-toggles {
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 0.88rem;
        max-width: 520px;
        pointer-events: auto;
      }
      #collider-toggles legend {
        padding: 0 4px;
        font-size: 0.82rem;
        opacity: 0.85;
      }
      #collider-toggles label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        cursor: pointer;
        user-select: none;
      }
      #collider-toggles input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #5ec8ff;
        cursor: pointer;
      }
      #collider-toggles .swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
      #collider-toggles .swatch.fixed {
        background: #26bfff;
      }
      #collider-toggles .swatch.movable {
        background: #ff7310;
      }
      #model-switcher {
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 0.88rem;
        max-width: 520px;
        pointer-events: auto;
      }
      #model-switcher legend {
        padding: 0 4px;
        font-size: 0.82rem;
        opacity: 0.85;
      }
      #model-switcher label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        cursor: pointer;
        user-select: none;
      }
      #model-switcher input[type="radio"],
      #model-switcher input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #5ec8ff;
        cursor: pointer;
      }
      #model-switcher .hint {
        margin: 8px 0 0;
        font-size: 0.78rem;
        opacity: 0.7;
        line-height: 1.4;
      }
      #collision-toggles {
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 0.88rem;
        max-width: 520px;
        pointer-events: auto;
      }
      #collision-toggles legend {
        padding: 0 4px;
        font-size: 0.82rem;
        opacity: 0.85;
      }
      #collision-toggles label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        cursor: pointer;
        user-select: none;
      }
      #collision-toggles input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #5ec8ff;
        cursor: pointer;
      }
      #collision-toggles .swatch.collision {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: #26bfff;
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
      #collision-toggles .hint {
        margin: 8px 0 0;
        font-size: 0.78rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="loading">3DGS 모델 로딩 중...</div>
    <div id="hud">
      <div id="collision-status" data-state="idle">
        <strong id="collision-title">충돌 검사 준비 중...</strong>
        <span id="collision-detail"></span>
      </div>
      <p>3Dcam 창고 SOG · WASD/화살표 · 탭 전환 시 렌더 중지</p>
      <fieldset id="collision-toggles">
        <legend>Collision mesh (voxel)</legend>
        <label>
          <input type="checkbox" id="toggle-collision" checked />
          <span class="swatch collision" aria-hidden="true"></span>
          반투명 와이어 — 해골 고정 객체와 동일 방식
        </label>
        <p class="hint">전처리: <code>npm run preprocess:warehouse:voxel</code> · 구역이 비면 기존 collision.glb 삭제 후 재생성</p>
      </fieldset>
    </div>
    <div id="lod-status" hidden>
      <strong>LoD 스플랫</strong>
      <span id="lod-status-loaded">—</span>
      <span id="lod-status-pct">—</span>
    </div>
    <div id="perf-status" hidden>
      <strong>성능 / 화질</strong>
      <span id="perf-fps">— fps</span>
      <span id="perf-frame">— ms</span>
      <span id="perf-resolution">—</span>
      <span id="perf-splats">—</span>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
